<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aathish</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #04091a;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* BACKGROUND */
  .bg {
    position: fixed; inset: 0;
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, rgba(3,8,22,0.82) 0%, rgba(3,8,22,0.5) 55%, rgba(3,8,22,0.85) 100%);
  }

  /* NEURAL NETWORK CANVAS */
  #neural { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* STARS — canvas-based, parallax on cursor */
  #starCanvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  /* SHOOTING STAR */
  .shooting-star {
    position: fixed; width: 140px; height: 1.5px; border-radius: 50%;
    background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.95));
    z-index: 3; pointer-events: none; opacity: 0;
  }
  @keyframes shoot {
    0%   { opacity: 0; transform: translateX(0) translateY(0) rotate(-30deg); }
    5%   { opacity: 1; }
    100% { opacity: 0; transform: translateX(600px) translateY(260px) rotate(-30deg); }
  }

  /* AURORA */
  .aurora {
    position: fixed; bottom: -200px; left: -10%; width: 120%; height: 420px;
    z-index: 2; pointer-events: none; border-radius: 50%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(60,30,180,0.04) 40%,
      rgba(100,60,255,0.07) 60%,
      rgba(40,180,200,0.05) 80%,
      transparent 100%
    );
    animation: auroraWave 10s ease-in-out infinite;
    filter: blur(30px);
  }
  .aurora2 {
    position: fixed; bottom: -150px; left: 20%; width: 80%; height: 350px;
    z-index: 2; pointer-events: none; border-radius: 50%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(120,40,220,0.05) 40%,
      rgba(40,200,180,0.07) 70%,
      transparent 100%
    );
    animation: auroraWave 14s ease-in-out infinite reverse 2s;
    filter: blur(40px);
  }
  @keyframes auroraWave {
    0%, 100% { transform: scaleX(1) translateY(0); opacity: 0.7; }
    33%       { transform: scaleX(1.08) translateY(-20px); opacity: 1; }
    66%       { transform: scaleX(0.94) translateY(10px); opacity: 0.5; }
  }

  /* CLICK SPARKS */
  .spark {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 20;
    animation: sparkFly var(--sd) ease-out forwards;
  }
  @keyframes sparkFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
  }

  /* LAYOUT */
  .container {
    position: relative; z-index: 10;
    display: flex; align-items: center;
    gap: 5rem; padding: 2rem;
    max-width: 960px; width: 100%;
  }

  /* PHOTO */
  .photo-wrap {
    flex-shrink: 0; position: relative;
    animation: slideLeft 1.1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .photo-outer {
    padding: 2px; border-radius: 22px;
    background: linear-gradient(160deg, rgba(120,110,255,0.7) 0%, rgba(255,255,255,0.08) 50%, rgba(80,200,255,0.4) 100%);
    box-shadow: 0 0 60px rgba(100,90,255,0.25), 0 30px 60px rgba(0,0,0,0.5);
    animation: borderRotate 6s linear infinite;
    position: relative;
  }
  @keyframes borderRotate {
    0%   { background: linear-gradient(160deg, rgba(120,110,255,0.7) 0%, rgba(255,255,255,0.08) 50%, rgba(80,200,255,0.4) 100%); }
    33%  { background: linear-gradient(220deg, rgba(80,200,255,0.7) 0%, rgba(255,255,255,0.08) 50%, rgba(200,100,255,0.4) 100%); }
    66%  { background: linear-gradient(280deg, rgba(200,100,255,0.7) 0%, rgba(255,255,255,0.08) 50%, rgba(120,110,255,0.4) 100%); }
    100% { background: linear-gradient(160deg, rgba(120,110,255,0.7) 0%, rgba(255,255,255,0.08) 50%, rgba(80,200,255,0.4) 100%); }
  }
  .photo-wrap img {
    width: 340px; height: 430px;
    object-fit: cover; object-position: top center;
    border-radius: 22px; display: block;
    filter: brightness(1.04) contrast(1.03) saturate(1.05);
    transition: filter 0.4s, transform 0.15s ease;
  }
  .photo-wrap::after {
    content: ''; position: absolute;
    bottom: -28px; left: 8%; width: 84%; height: 22px;
    background: rgba(100,90,255,0.4);
    border-radius: 50%; filter: blur(18px);
  }
  .photo-outer::before {
    content: ''; position: absolute;
    top: -4px; right: -4px;
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(150,140,255,0.9);
    box-shadow: 0 0 14px rgba(150,140,255,1);
    animation: pulse 3s ease-in-out infinite; z-index: 2;
  }

  /* FLOATING PARTICLES */
  .particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: floatParticle var(--pd) ease-in-out infinite var(--pdelay);
  }
  @keyframes floatParticle {
    0%, 100% { transform: translateY(0) scale(1); opacity: var(--pop); }
    50% { transform: translateY(-20px) scale(1.4); opacity: calc(var(--pop)*0.35); }
  }

  /* INFO */
  .info {
    animation: slideRight 1.1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    display: flex; flex-direction: column;
  }

  /* NAME */
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.8rem, 7vw, 6.2rem);
    font-weight: 700; color: #f0eeff;
    line-height: 0.92; letter-spacing: -3px;
    margin-bottom: 1.4rem;
    text-shadow: 0 4px 40px rgba(130,120,255,0.3);
    position: relative;
    cursor: default;
  }
  h1 em { font-style: italic; font-weight: 400; color: rgba(200,195,255,0.85); }

  /* ROLE PILL */
  .role-pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 22px; border-radius: 50px;
    border: 1px solid rgba(120,110,255,0.35);
    background: rgba(80,70,180,0.15);
    backdrop-filter: blur(10px); color: #c0b8ff;
    font-size: 0.78rem; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 1.6rem; width: fit-content;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .pulse-dot {
    width: 7px; height: 7px; background: #9088ff; border-radius: 50%;
    flex-shrink: 0; box-shadow: 0 0 8px rgba(144,136,255,0.8);
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* TAGLINE */
  .tagline {
    font-size: 0.95rem; font-weight: 300;
    letter-spacing: 1.5px; margin-bottom: 2rem;
    min-height: 1.2em; color: rgba(255,255,255,0.55);
    border-right: 1.5px solid rgba(180,170,255,0.5);
    width: fit-content; overflow: hidden; white-space: nowrap;
    animation: typing 1.8s steps(22,end) 1.2s both, blinkCaret 0.75s step-end 1.2s 4;
  }
  @keyframes typing { from { width: 0; } to { width: 22ch; } }
  @keyframes blinkCaret {
    0%, 100% { border-color: rgba(180,170,255,0.5); }
    50% { border-color: transparent; }
  }

  /* SOCIAL */
  .social-row { display: flex; gap: 12px; align-items: center; }
  .social-btn {
    width: 54px; height: 54px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.09);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; cursor: pointer; position: relative;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .social-btn:hover {
    transform: translateY(-7px) scale(1.12);
    background: rgba(255,255,255,0.11);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 14px 30px rgba(0,0,0,0.4), 0 0 22px rgba(120,110,255,0.2);
  }
  .social-btn svg { width: 26px; height: 26px; }
  .social-btn:nth-child(1) { animation: popUp 0.6s 0.5s  cubic-bezier(0.34,1.56,0.64,1) both; }
  .social-btn:nth-child(2) { animation: popUp 0.6s 0.62s cubic-bezier(0.34,1.56,0.64,1) both; }
  .social-btn:nth-child(3) { animation: popUp 0.6s 0.74s cubic-bezier(0.34,1.56,0.64,1) both; }
  .social-btn:nth-child(4) { animation: popUp 0.6s 0.86s cubic-bezier(0.34,1.56,0.64,1) both; }
  .social-btn:nth-child(5) { animation: popUp 0.6s 0.98s cubic-bezier(0.34,1.56,0.64,1) both; }
  .social-btn::after {
    content: attr(title); position: absolute;
    bottom: calc(100% + 9px); left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(20,18,45,0.92); backdrop-filter: blur(10px);
    color: rgba(255,255,255,0.85); font-size: 0.65rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 5px 11px; border-radius: 7px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .social-btn:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* KEYFRAMES */
  @keyframes slideLeft  { from { opacity:0; transform:translateX(-50px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideRight { from { opacity:0; transform:translateX(50px);  } to { opacity:1; transform:translateX(0); } }
  @keyframes popUp      { from { opacity:0; transform:translateY(20px) scale(0.8); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes pulse      { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.35;transform:scale(0.6);} }

  @media (max-width: 700px) {
    body { overflow-y: auto; }
    .container { flex-direction: column; text-align: center; gap: 2.5rem; padding: 3rem 1.5rem; }
    .photo-wrap img { width: 220px; height: 280px; }
    .role-pill, .tagline { margin-left: auto; margin-right: auto; }
    .social-row { justify-content: center; }
    #neural { display: none; }
  }
</style>
</head>

<script>
// ── PARALLAX STARS (cursor follow) ──
const starCanvas = document.getElementById('starCanvas');
const sCtx = starCanvas.getContext('2d');
let sW, sH;

function resizeStars() {
  sW = starCanvas.width  = window.innerWidth;
  sH = starCanvas.height = window.innerHeight;
}
resizeStars();
window.addEventListener('resize', resizeStars);

const STAR_COUNT = 160;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  bx:    Math.random(),
  by:    Math.random(),
  r:     0.4 + Math.random() * 2,
  op:    0.25 + Math.random() * 0.65,
  phase: Math.random() * Math.PI * 2,
  speed: 0.4 + Math.random() * 1.2,
  depth: 0.02 + Math.random() * 0.12
}));

let mouseX = sW / 2, mouseY = sH / 2;
let smoothX = sW / 2, smoothY = sH / 2;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: true });

let starT = 0;
function drawStars() {
  starT += 0.016;
  smoothX += (mouseX - smoothX) * 0.06;
  smoothY += (mouseY - smoothY) * 0.06;

  const ox = (smoothX / sW) - 0.5;
  const oy = (smoothY / sH) - 0.5;

  sCtx.clearRect(0, 0, sW, sH);

  stars.forEach(s => {
    const shiftX = ox * sW * s.depth * 2.5;
    const shiftY = oy * sH * s.depth * 2.5;
    const x = (s.bx * sW + shiftX + sW) % sW;
    const y = (s.by * sH + shiftY + sH) % sH;
    const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(starT * s.speed + s.phase));
    const alpha = s.op * twinkle;
    sCtx.beginPath();
    sCtx.arc(x, y, s.r * twinkle, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    sCtx.fill();
  });

  requestAnimationFrame(drawStars);
}
drawStars();

// ── SHOOTING STARS ──
function shootingStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  el.style.cssText = `top:${Math.random()*45}%;left:${Math.random()*55}%;animation:shoot ${1.1+Math.random()*0.9}s ease-out forwards;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}
shootingStar();
setInterval(shootingStar, 4000 + Math.random()*3000);

// ── CLICK SPARKS ──
document.addEventListener('click', e => {
  const colors = ['#a78bff','#60c8ff','#ff7eb3','#fff','#7dd3fc','#c4b5fd'];
  for (let i = 0; i < 14; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    const sz = 4 + Math.random() * 6;
    const angle = (Math.PI * 2 / 14) * i + Math.random() * 0.3;
    const dist = 40 + Math.random() * 70;
    sp.style.cssText = `
      width:${sz}px;height:${sz}px;
      left:${e.clientX}px;top:${e.clientY}px;
      background:${colors[i%colors.length]};
      box-shadow:0 0 ${sz*2}px ${colors[i%colors.length]};
      --sx:${Math.cos(angle)*dist}px;
      --sy:${Math.sin(angle)*dist}px;
      --sd:${0.5+Math.random()*0.4}s;
    `;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 900);
  }
});

// ── FLOATING PARTICLES around photo ──
const wrap = document.getElementById('photoWrap');
const pColors = ['rgba(150,140,255,0.75)','rgba(80,200,255,0.65)','rgba(220,150,255,0.65)','rgba(100,220,200,0.6)'];
for (let i = 0; i < 8; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const sz = 3 + Math.random() * 6;
  p.style.cssText = `
    width:${sz}px;height:${sz}px;
    background:${pColors[i%pColors.length]};
    top:${8+Math.random()*84}%;
    left:${Math.random()>0.5 ? 102+Math.random()*4 : -6-Math.random()*4}%;
    --pd:${3+Math.random()*4}s;
    --pdelay:-${Math.random()*5}s;
    --pop:${0.45+Math.random()*0.45};
    box-shadow:0 0 ${sz*2.5}px ${pColors[i%pColors.length]};
  `;
  wrap.appendChild(p);
}

// ── 3D PHOTO TILT ──
const photoOuter = document.getElementById('photoOuter');
const photoImg   = document.getElementById('photoImg');
wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width  - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  photoOuter.style.transform = `perspective(700px) rotateY(${x*16}deg) rotateX(${-y*16}deg) scale(1.03)`;
  photoImg.style.filter = `brightness(1.08) contrast(1.04) saturate(1.1)`;
});
wrap.addEventListener('mouseleave', () => {
  photoOuter.style.transform = 'perspective(700px) rotateY(0deg) rotateX(0deg) scale(1)';
  photoImg.style.filter = 'brightness(1.04) contrast(1.03) saturate(1.05)';
});
photoOuter.style.transition = 'transform 0.18s ease, background 2s linear';

// ── NEURAL NETWORK ──
const canvas = document.getElementById('neural');
const ctx    = canvas.getContext('2d');
let W, H, nodes = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Node {
  constructor() { this.reset(); }
  reset() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.r  = 1.5 + Math.random() * 2;
    this.op = 0.2 + Math.random() * 0.5;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
}

for (let i = 0; i < 55; i++) nodes.push(new Node());

function drawNeural() {
  ctx.clearRect(0, 0, W, H);
  nodes.forEach(n => n.update());
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 140) {
        const alpha = (1 - dist/140) * 0.18;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(120,110,255,${alpha})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(140,130,255,${nodes[i].op * 0.55})`;
    ctx.fill();
  }
  requestAnimationFrame(drawNeural);
}
drawNeural();
</script>
